<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <!-- The masthead glyph: a tiny printed crossword. Paper cells, ink
       frame, one ink block, one oxblood block, a serif A — the product
       in one stamp. Static light-theme colors (favicons can't read the
       app's CSS variables): paper #fdfbf7, ink #201b15, oxblood #942f21. -->
  <rect x="1.5" y="1.5" width="33" height="33" rx="3" fill="#fdfbf7" stroke="#201b15" stroke-width="2.5"/>
  <line x1="12.5" y1="2.5" x2="12.5" y2="33.5" stroke="#201b15" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="23.5" y1="2.5" x2="23.5" y2="33.5" stroke="#201b15" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="2.5" y1="12.5" x2="33.5" y2="12.5" stroke="#201b15" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="2.5" y1="23.5" x2="33.5" y2="23.5" stroke="#201b15" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="23.5" y="2.5" width="10" height="10" fill="#201b15"/>
  <rect x="2.5" y="23.5" width="10" height="10" fill="#942f21"/>
  <text x="18" y="22" text-anchor="middle" fill="#201b15" font-size="14" font-weight="700" font-family="Georgia, 'Times New Roman', serif">A</text>
</svg>
